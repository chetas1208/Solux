[workspace]
name = "solux-models"
version = "0.2.0"
description = "Solux model orchestrator with Modular Mojo kernels and MAX critic"
channels = ["https://conda.modular.com/max/", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
mojo = "*"
max = "*"
python = "3.12.*"
numpy = ">=1.26"
modular = ">=26.4.0,<27"

[tasks]
build-kernels = "bash modular/build-kernels.sh"
serve-critic = "bash modular/serve-local-critic.sh"
