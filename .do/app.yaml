name: solux
region: nyc

services:
  - name: api
    github:
      repo: chetas1208/Solux
      branch: main
      deploy_on_push: false
    dockerfile_path: ops/docker/Dockerfile.api
    source_dir: /
    http_port: 3001
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        type: SECRET
        value: ${MONGODB_URI}
      - key: MONGODB_DB
        value: solux
      - key: GEMINI_API_KEY
        type: SECRET
        value: ${GEMINI_API_KEY}
      - key: NREL_API_KEY
        type: SECRET
        value: ${NREL_API_KEY}
      - key: MINIMAX_API_KEY
        type: SECRET
        value: ${MINIMAX_API_KEY}
      - key: MINIMAX_GROUP_ID
        type: SECRET
        value: ${MINIMAX_GROUP_ID}
      - key: CORS_ORIGIN
        value: ${web.PUBLIC_URL}
      - key: DIGITALOCEAN_SPACES_ENDPOINT
        value: ${DIGITALOCEAN_SPACES_ENDPOINT}
      - key: DIGITALOCEAN_SPACES_BUCKET
        value: solux-reports
      - key: DIGITALOCEAN_SPACES_KEY
        type: SECRET
        value: ${DIGITALOCEAN_SPACES_KEY}
      - key: DIGITALOCEAN_SPACES_SECRET
        type: SECRET
        value: ${DIGITALOCEAN_SPACES_SECRET}
    health_check:
      http_path: /health

  - name: web
    github:
      repo: chetas1208/Solux
      branch: main
      deploy_on_push: false
    dockerfile_path: ops/docker/Dockerfile.web
    source_dir: /
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NUXT_PUBLIC_API_BASE_URL
        value: ${api.PUBLIC_URL}
      - key: NUXT_PUBLIC_MAPTILER_KEY
        value: ${NUXT_PUBLIC_MAPTILER_KEY}
