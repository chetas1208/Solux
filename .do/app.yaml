name: solux
region: sfo

services:
  - name: api
    github:
      repo: chetas1208/Solux
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: pnpm --filter @solux/api build
    run_command: node_modules/.bin/tsx apps/api/src/server.ts
    http_port: 3001
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        type: SECRET
        value: PLACEHOLDER
      - key: MONGODB_DB
        value: solux
      - key: GEMINI_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: NREL_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: MINIMAX_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: MINIMAX_GROUP_ID
        type: SECRET
        value: PLACEHOLDER
      - key: CORS_ORIGIN
        value: ${web.PUBLIC_URL}
      - key: DIGITALOCEAN_SPACES_ENDPOINT
        value: PLACEHOLDER
      - key: DIGITALOCEAN_SPACES_BUCKET
        value: solux
      - key: DIGITALOCEAN_SPACES_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: DIGITALOCEAN_SPACES_SECRET
        type: SECRET
        value: PLACEHOLDER
    health_check:
      http_path: /health

  - name: web
    github:
      repo: chetas1208/Solux
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: pnpm --filter @solux/web build
    run_command: node apps/web/.output/server/index.mjs
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NUXT_PUBLIC_API_BASE_URL
        value: ${api.PUBLIC_URL}
      - key: NUXT_PUBLIC_MAPTILER_KEY
        value: PLACEHOLDER
