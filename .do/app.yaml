name: solux
region: sfo

services:
  - name: api
    github:
      repo: chetas1208/Solux
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: pnpm install --frozen-lockfile && pnpm --filter @solux/api build
    run_command: node apps/api/dist/server.js
    http_port: 3001
    http_path: /health
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        type: SECRET
        value: PLACEHOLDER
      - key: MONGODB_DB
        value: solux
      - key: GEMINI_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: NREL_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: MINIMAX_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: MINIMAX_GROUP_ID
        type: SECRET
        value: PLACEHOLDER
      - key: CORS_ORIGIN
        value: ${web.PUBLIC_URL}
      - key: DIGITALOCEAN_SPACES_ENDPOINT
        value: PLACEHOLDER
      - key: DIGITALOCEAN_SPACES_BUCKET
        value: solux
      - key: DIGITALOCEAN_SPACES_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: DIGITALOCEAN_SPACES_SECRET
        type: SECRET
        value: PLACEHOLDER
      - key: GOOGLE_MAPS_API_KEY
        type: SECRET
        value: PLACEHOLDER
      - key: SOLUX_MODEL_ENDPOINT
        value: ""
      - key: SOLUX_MODEL_ENDPOINT_AUTH
        type: SECRET
        value: PLACEHOLDER

  - name: web
    github:
      repo: chetas1208/Solux
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: pnpm install --frozen-lockfile && pnpm --filter @solux/web build
    run_command: node apps/web/.output/server/index.mjs
    http_port: 3000
    http_path: /
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NUXT_PUBLIC_API_BASE_URL
        value: ${api.PUBLIC_URL}
      - key: NUXT_PUBLIC_MAPTILER_KEY
        value: PLACEHOLDER
      - key: NUXT_PUBLIC_MAP_PROVIDER
        value: cesium
      - key: NUXT_PUBLIC_ENABLE_3D_EARTH
        value: "true"
      - key: NUXT_PUBLIC_CESIUM_ION_TOKEN
        value: PLACEHOLDER
      - key: NUXT_PUBLIC_GOOGLE_MAPS_API_KEY
        value: PLACEHOLDER
      - key: NUXT_PUBLIC_GOOGLE_3D_TILES_ENABLED
        value: "false"
      - key: NUXT_PUBLIC_MAP_FALLBACK
        value: maplibre
